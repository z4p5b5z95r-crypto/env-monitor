<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>環境監測 — 管理後台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

/* ── 密碼畫面 ── */
#screen-login {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
.login-card {
  background: #fff; border-radius: 16px; padding: 40px 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08); width: 100%; max-width: 360px;
}
.login-logo { font-size: 36px; text-align: center; margin-bottom: 8px; }
.login-title { text-align: center; font-size: 18px; font-weight: 700; color: #185FA5; margin-bottom: 4px; }
.login-sub   { text-align: center; font-size: 12px; color: #999; margin-bottom: 28px; }
.login-input {
  width: 100%; height: 44px; border: 1.5px solid #ddd; border-radius: 10px;
  padding: 0 14px; font-size: 15px; margin-bottom: 12px; outline: none;
  transition: border-color .2s;
}
.login-input:focus { border-color: #185FA5; }
.login-btn {
  width: 100%; height: 44px; background: #185FA5; color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
}
.login-btn:hover { background: #1450a0; }
.login-error { color: #e53; font-size: 13px; text-align: center; margin-top: 8px; }

/* ── 管理後台 ── */
#screen-admin { display: none; }
.admin-header {
  background: #185FA5; color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.admin-header-title { font-size: 16px; font-weight: 700; }
.logout-btn {
  background: rgba(255,255,255,.2); border: none; color: #fff;
  padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer;
}
.logout-btn:hover { background: rgba(255,255,255,.3); }

/* ── 分頁 ── */
.tab-bar {
  background: #fff; display: flex; border-bottom: 1.5px solid #eee;
  position: sticky; top: 49px; z-index: 99;
}
.tab {
  flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; font-weight: 500;
  color: #888; cursor: pointer; border-bottom: 3px solid transparent;
  transition: all .15s;
}
.tab.active { color: #185FA5; border-bottom-color: #185FA5; font-weight: 700; }

.tab-content { display: none; padding: 20px; max-width: 860px; margin: 0 auto; }
.tab-content.active { display: block; }

/* ── 卡片 ── */
.card {
  background: #fff; border-radius: 14px; overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,.07); margin-bottom: 16px;
}
.card-title {
  padding: 14px 18px 10px; font-size: 12px; font-weight: 700;
  color: #185FA5; letter-spacing: .06em; border-bottom: 1px solid #f0f0f0;
}
.list-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-bottom: .5px solid #f5f5f5;
}
.list-row:last-child { border-bottom: none; }
.row-main { flex: 1; }
.row-name { font-size: 14px; font-weight: 600; color: #333; }
.row-sub  { font-size: 11px; color: #999; margin-top: 2px; }
.del-btn {
  background: #fff; border: 1px solid #fcc; color: #e53;
  padding: 4px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
  white-space: nowrap;
}
.del-btn:hover { background: #fff0f0; }
.empty-hint { padding: 20px 18px; font-size: 13px; color: #aaa; }

/* ── 表單 ── */
.form-card { background: #fff; border-radius: 14px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
.form-title { font-size: 13px; font-weight: 700; color: #185FA5; margin-bottom: 12px; }
.form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.form-input {
  flex: 1; min-width: 160px; height: 38px; border: 1.5px solid #ddd;
  border-radius: 9px; padding: 0 12px; font-size: 13px; outline: none;
  transition: border-color .2s;
}
.form-input:focus { border-color: #185FA5; }
.form-textarea {
  width: 100%; min-height: 80px; border: 1.5px solid #ddd; border-radius: 9px;
  padding: 10px 12px; font-size: 13px; resize: vertical; font-family: inherit; outline: none;
}
.form-textarea:focus { border-color: #185FA5; }
.form-select {
  flex: 1; min-width: 160px; height: 38px; border: 1.5px solid #ddd;
  border-radius: 9px; padding: 0 12px; font-size: 13px; background: #fff; outline: none;
}
.add-btn {
  height: 38px; padding: 0 20px; background: #185FA5; color: #fff;
  border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.add-btn:hover { background: #1450a0; }
.save-btn {
  height: 38px; padding: 0 20px; background: #06C755; color: #fff;
  border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
}
.save-btn:hover { background: #05a847; }

/* ── 點位/模板選擇計畫 ── */
.proj-selector { margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.proj-selector label { font-size: 13px; font-weight: 600; color: #555; white-space: nowrap; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.78); color: #fff; font-size: 13px;
  padding: 10px 22px; border-radius: 24px; display: none; z-index: 999; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
</style>
</head>
<body>

<!-- 密碼畫面 -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">🌿</div>
    <div class="login-title">環境監測系統</div>
    <div class="login-sub">管理後台</div>
    <input class="login-input" type="password" id="pw-input" placeholder="請輸入密碼"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- 管理後台 -->
<div id="screen-admin">
  <div class="admin-header">
    <div class="admin-header-title">🌿 環境監測 管理後台</div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('proj')">計畫管理</div>
    <div class="tab" onclick="switchTab('station')">點位管理</div>
    <div class="tab" onclick="switchTab('template')">提醒模板</div>
  </div>

  <!-- 計畫管理 -->
  <div id="tab-proj" class="tab-content active">
    <div class="form-card">
      <div class="form-title">＋ 新增計畫</div>
      <div class="form-row">
        <input class="form-input" id="proj-name" type="text" placeholder="計畫名稱（必填）">
        <input class="form-input" id="proj-desc" type="text" placeholder="說明（選填）">
        <button class="add-btn" onclick="addProject()">新增</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">現有計畫</div>
      <div id="proj-list"><div class="empty-hint">載入中...</div></div>
    </div>
  </div>

  <!-- 點位管理 -->
  <div id="tab-station" class="tab-content">
    <div class="proj-selector">
      <label>選擇計畫：</label>
      <select class="form-select" id="station-proj-sel" onchange="loadStations()">
        <option value="">— 請選擇 —</option>
      </select>
    </div>
    <div class="form-card" id="station-form" style="display:none">
      <div class="form-title">＋ 新增點位</div>
      <div class="form-row">
        <input class="form-input" id="st-name" type="text" placeholder="點位名稱（必填）">
        <input class="form-input" id="st-loc"  type="text" placeholder="地點（選填）">
        <input class="form-input" id="st-note" type="text" placeholder="備注（選填）">
        <button class="add-btn" onclick="addStation()">新增</button>
      </div>
    </div>
    <div class="card" id="station-list-card" style="display:none">
      <div class="card-title">點位清單</div>
      <div id="station-list"></div>
    </div>
  </div>

  <!-- 提醒模板 -->
  <div id="tab-template" class="tab-content">
    <div class="proj-selector">
      <label>選擇計畫：</label>
      <select class="form-select" id="tpl-proj-sel" onchange="loadTemplates()">
        <option value="">— 請選擇 —</option>
      </select>
    </div>

    <!-- 提醒內容 -->
    <div class="form-card" id="tpl-form" style="display:none">
      <div class="form-title">＋ 新增提醒事項</div>
      <div class="form-row">
        <input class="form-input" id="tpl-category" type="text" placeholder="類別（例：出發前提醒）">
        <button class="add-btn" onclick="addTemplate()">新增</button>
      </div>
      <textarea class="form-textarea" id="tpl-content" placeholder="提醒內容（例：攜帶採水桶、滾輪泵浦、確認採樣瓶數量）"></textarea>
    </div>
    <div class="card" id="tpl-list-card" style="display:none">
      <div class="card-title">提醒事項清單</div>
      <div id="tpl-list"></div>
    </div>

    <!-- 拍照項目 -->
    <div class="form-card" id="photo-form" style="display:none">
      <div class="form-title">📷 拍照項目設定</div>
      <div style="font-size:12px;color:#999;margin-bottom:8px">用逗號分隔，例：環境照,水色,洗井紀錄表</div>
      <div class="form-row">
        <input class="form-input" id="photo-items-input" type="text" placeholder="環境照,水色,洗井紀錄表">
        <button class="save-btn" onclick="savePhotoItems()">儲存</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// ★ 設定區 ★
// ============================================================
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbwhF-X8KAscHycjSeilIgcLxZcz_fMiw5kmOgoVzrjaSF9ePDWolit4FL9ox157JosO/exec';
const PASSWORD = 'env2026';   // ← 可自行修改密碼
// ============================================================

let projects = [];
let currentStations  = [];
let currentTemplates = [];

// ── 密碼 ──────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === PASSWORD) {
    sessionStorage.setItem('admin_ok', '1');
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-admin').style.display = 'block';
    loadProjects();
  } else {
    document.getElementById('login-error').textContent = '密碼錯誤，請再試一次';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
function doLogout() {
  sessionStorage.removeItem('admin_ok');
  location.reload();
}

// 自動登入（同 session 不用再輸入）
if (sessionStorage.getItem('admin_ok') === '1') {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-admin').style.display = 'block';
  loadProjects();
}

// ── 分頁 ──────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['proj','station','template'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ── 計畫管理 ──────────────────────────────────────────────
async function loadProjects() {
  try {
    const res  = await fetch(`${GAS_URL}?action=getProjects`);
    const json = await res.json();
    projects   = json.data || [];
    renderProjList();
    refreshProjSelectors();
  } catch (e) { showToast('載入失敗'); }
}

function renderProjList() {
  const el = document.getElementById('proj-list');
  if (!projects.length) { el.innerHTML = '<div class="empty-hint">尚無計畫，請新增</div>'; return; }
  el.innerHTML = projects.map(p => `
    <div class="list-row">
      <div class="row-main">
        <div class="row-name">${p.name}</div>
        ${p.description ? `<div class="row-sub">${p.description}</div>` : ''}
        <div class="row-sub" style="color:#aaa;font-size:10px">${p.projectId}</div>
      </div>
      <button class="del-btn" onclick="delProject('${p.projectId}','${p.name}')">刪除</button>
    </div>`).join('');
}

function refreshProjSelectors() {
  ['station-proj-sel','tpl-proj-sel'].forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">— 請選擇 —</option>'
      + projects.map(p => `<option value="${p.projectId}"${p.projectId===cur?' selected':''}>${p.name}</option>`).join('');
  });
}

async function addProject() {
  const name = document.getElementById('proj-name').value.trim();
  const desc = document.getElementById('proj-desc').value.trim();
  if (!name) { showToast('請輸入計畫名稱'); return; }
  try {
    const res  = await post({ action:'createProject', name, description: desc });
    if (!res.ok) throw new Error(res.error);
    showToast('計畫已新增 ✓');
    document.getElementById('proj-name').value = '';
    document.getElementById('proj-desc').value = '';
    await loadProjects();
  } catch (e) { showToast('新增失敗：' + e.message); }
}

async function delProject(projectId, name) {
  if (!confirm(`確定刪除計畫「${name}」？\n（不會刪除已有的 Sheets 記錄）`)) return;
  try {
    await post({ action:'deleteProject', projectId });
    showToast('已刪除');
    await loadProjects();
  } catch (e) { showToast('刪除失敗'); }
}

// ── 點位管理 ──────────────────────────────────────────────
async function loadStations() {
  const projectId = document.getElementById('station-proj-sel').value;
  if (!projectId) { document.getElementById('station-form').style.display='none'; document.getElementById('station-list-card').style.display='none'; return; }
  document.getElementById('station-form').style.display='block';
  document.getElementById('station-list-card').style.display='block';
  try {
    const res = await fetch(`${GAS_URL}?action=getStations&projectId=${projectId}`);
    currentStations = (await res.json()).data || [];
    renderStationList();
  } catch (e) { showToast('載入失敗'); }
}

function renderStationList() {
  const el = document.getElementById('station-list');
  if (!currentStations.length) { el.innerHTML = '<div class="empty-hint">尚無點位</div>'; return; }
  el.innerHTML = currentStations.map(s => `
    <div class="list-row">
      <div class="row-main">
        <div class="row-name">${s.name}</div>
        ${s.location ? `<div class="row-sub">${s.location}</div>` : ''}
        ${s.note     ? `<div class="row-sub" style="color:#D97706">⚠️ ${s.note}</div>` : ''}
        <div class="row-sub" style="color:#aaa;font-size:10px">${s.stationId}</div>
      </div>
      <button class="del-btn" onclick="delStation('${s.stationId}','${s.name}')">刪除</button>
    </div>`).join('');
}

async function addStation() {
  const projectId = document.getElementById('station-proj-sel').value;
  const name = document.getElementById('st-name').value.trim();
  if (!name) { showToast('請輸入點位名稱'); return; }
  const loc  = document.getElementById('st-loc').value.trim();
  const note = document.getElementById('st-note').value.trim();
  try {
    const res = await post({ action:'createStation', projectId, name, location: loc, note });
    if (!res.ok) throw new Error(res.error);
    showToast('點位已新增 ✓');
    document.getElementById('st-name').value = '';
    document.getElementById('st-loc').value  = '';
    document.getElementById('st-note').value = '';
    await loadStations();
  } catch (e) { showToast('新增失敗：' + e.message); }
}

async function delStation(stationId, name) {
  if (!confirm(`確定刪除點位「${name}」？`)) return;
  try {
    await post({ action:'deleteStation', stationId });
    showToast('已刪除');
    await loadStations();
  } catch (e) { showToast('刪除失敗'); }
}

// ── 提醒模板 ──────────────────────────────────────────────
async function loadTemplates() {
  const projectId = document.getElementById('tpl-proj-sel').value;
  ['tpl-form','tpl-list-card','photo-form'].forEach(id => {
    document.getElementById(id).style.display = projectId ? 'block' : 'none';
  });
  if (!projectId) return;
  try {
    const res = await fetch(`${GAS_URL}?action=getTemplates&projectId=${projectId}`);
    const all = (await res.json()).data || [];
    currentTemplates = all.filter(t => t.category !== '拍照任務');
    const photoTpl   = all.find(t => t.category === '拍照任務');
    document.getElementById('photo-items-input').value = photoTpl ? photoTpl.photoItems : '';
    renderTemplateList();
  } catch (e) { showToast('載入失敗'); }
}

function renderTemplateList() {
  const el = document.getElementById('tpl-list');
  if (!currentTemplates.length) { el.innerHTML = '<div class="empty-hint">尚無提醒事項</div>'; return; }
  el.innerHTML = currentTemplates.map(t => `
    <div class="list-row" style="align-items:flex-start">
      <div class="row-main">
        <div class="row-name" style="color:#185FA5;font-size:12px;margin-bottom:4px">${t.category}</div>
        <div style="font-size:13px;color:#444;white-space:pre-wrap">${t.content}</div>
      </div>
      <button class="del-btn" onclick="delTemplate('${t.templateId}')">刪除</button>
    </div>`).join('');
}

async function addTemplate() {
  const projectId = document.getElementById('tpl-proj-sel').value;
  const category  = document.getElementById('tpl-category').value.trim();
  const content   = document.getElementById('tpl-content').value.trim();
  if (!category || !content) { showToast('請輸入類別與提醒內容'); return; }
  try {
    const res = await post({ action:'saveTemplate', projectId, category, content });
    if (!res.ok) throw new Error(res.error);
    showToast('提醒已新增 ✓');
    document.getElementById('tpl-category').value = '';
    document.getElementById('tpl-content').value  = '';
    await loadTemplates();
  } catch (e) { showToast('新增失敗：' + e.message); }
}

async function delTemplate(templateId) {
  if (!confirm('確定刪除這筆提醒事項？')) return;
  try {
    await post({ action:'deleteTemplate', templateId });
    showToast('已刪除');
    await loadTemplates();
  } catch (e) { showToast('刪除失敗'); }
}

async function savePhotoItems() {
  const projectId  = document.getElementById('tpl-proj-sel').value;
  const photoItems = document.getElementById('photo-items-input').value.trim();
  if (!photoItems) { showToast('請輸入拍照項目'); return; }
  try {
    const res = await post({ action:'savePhotoItems', projectId, photoItems });
    if (!res.ok) throw new Error(res.error);
    showToast('拍照項目已儲存 ✓');
  } catch (e) { showToast('儲存失敗：' + e.message); }
}

// ── 工具 ──────────────────────────────────────────────────
async function post(data) {
  const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify(data) });
  return res.json();
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 2400);
}
</script>
</body>
</html>
