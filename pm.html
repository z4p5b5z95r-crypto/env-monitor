<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PM 發送任務</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f8f8f8; -webkit-tap-highlight-color: transparent; }

/* ── 共用 ── */
.header { background: #185FA5; color: #fff; padding: 48px 16px 14px; }
.header-title { font-size: 18px; font-weight: 600; }
.header-hint  { font-size: 11px; opacity: .8; margin-top: 3px; }
.back-btn { background: none; border: none; color: rgba(255,255,255,.85); font-size: 12px; cursor: pointer; padding: 0; margin-bottom: 8px; }

.spinner { width: 36px; height: 36px; border: 3px solid #ddd; border-top-color: #185FA5; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.section { padding: 14px 14px 0; }
.section-label { font-size: 12px; font-weight: 600; color: #888; letter-spacing: .04em; margin-bottom: 8px; }

/* ── 載入畫面 ── */
#screen-loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100vh; gap: 12px;
}
#loading-text { font-size: 13px; color: #888; }

/* ── 計畫選擇 ── */
#screen-project { display: none; }
.proj-btn {
  display: flex; align-items: center; gap: 10px; background: #fff;
  border: .5px solid #ddd; border-radius: 12px; padding: 12px 14px;
  margin-bottom: 8px; cursor: pointer; width: 100%; text-align: left;
  transition: border-color .15s, background .15s;
}
.proj-btn:active { border-color: #185FA5; background: #EBF4FF; }
.proj-dot  { width: 10px; height: 10px; border-radius: 50%; background: #185FA5; flex-shrink: 0; }
.proj-name { font-size: 14px; font-weight: 600; color: #333; }
.proj-desc { font-size: 11px; color: #888; margin-top: 2px; }

/* ── 任務組合畫面 ── */
#screen-compose { display: none; flex-direction: column; height: 100vh; }
.compose-scroll { flex: 1; overflow-y: auto; padding-bottom: 70px; }

/* 拍照項目清單 */
.item-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; background: #fff;
  border-bottom: .5px solid #f5f5f5; cursor: pointer;
}
.item-row:last-child { border-bottom: none; }
.check-box {
  width: 22px; height: 22px; border-radius: 6px;
  border: 1.5px solid #ddd; display: flex; align-items: center;
  justify-content: center; font-size: 14px; flex-shrink: 0; transition: all .15s;
}
.check-box.on { background: #185FA5; border-color: #185FA5; color: #fff; }
.item-label { font-size: 14px; color: #333; flex: 1; }
.item-delete { background: none; border: none; color: #ddd; font-size: 18px; cursor: pointer; padding: 0 2px; }

/* 新增自訂項目 */
.add-row { display: flex; gap: 8px; padding: 10px 14px; background: #fff; border-top: .5px solid #f5f5f5; }
.add-row input { flex: 1; height: 36px; border: .5px solid #ddd; border-radius: 8px; padding: 0 10px; font-size: 13px; }
.add-row button { height: 36px; padding: 0 16px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }

/* 模板快選 */
.template-chips { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 14px; background: #fff; border-bottom: .5px solid #f5f5f5; }
.template-chip { font-size: 11px; padding: 4px 10px; border-radius: 14px; background: #EBF4FF; color: #185FA5; cursor: pointer; border: .5px solid #185FA5; white-space: nowrap; }
.template-chip:active { background: #185FA5; color: #fff; }

/* 備注輸入 */
.note-input {
  width: 100%; min-height: 56px; border: .5px solid #ddd; border-radius: 10px;
  padding: 10px 12px; font-size: 13px; resize: none; font-family: inherit;
  background: #fff;
}

/* 點位預覽 */
.station-preview {
  background: #fff; border-radius: 12px; overflow: hidden; margin-top: 2px;
}
.station-preview-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  border-bottom: .5px solid #f5f5f5; font-size: 12px; color: #555;
}
.station-preview-row:last-child { border-bottom: none; }

/* 卡片預覽 */
.preview-card { background: #fff; border-radius: 14px; overflow: hidden; }
.preview-header { background: #185FA5; padding: 12px 14px; }
.preview-body { padding: 12px 14px; }
.preview-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; margin-bottom: 5px; }
.preview-item:last-child { margin-bottom: 0; }
.preview-footer {
  background: #185FA5; margin: 10px -14px -12px; padding: 10px 14px;
  text-align: center; color: #fff; font-size: 12px; font-weight: 600;
}

/* ── 底部發送列 ── */
.send-bar {
  position: sticky; bottom: 0; background: #fff; border-top: .5px solid #eee;
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}
.send-btn {
  width: 100%; height: 44px; background: #06C755; color: #fff;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.send-btn:disabled { background: #ddd; color: #aaa; pointer-events: none; }

/* ── 管理畫面 ── */
#screen-manage        { display: none; }
#screen-manage-proj   { display: none; }
.manage-header { background: #185FA5; color: #fff; padding: 48px 16px 14px; }
.manage-section { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
.manage-section-title { font-size: 12px; font-weight: 600; color: #888; letter-spacing: .04em; padding: 14px 14px 6px; }
.manage-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; border-bottom: .5px solid #f5f5f5;
}
.manage-row:last-child { border-bottom: none; }
.manage-row-label { font-size: 14px; color: #333; flex: 1; }
.manage-row-sub   { font-size: 11px; color: #aaa; }
.manage-del-btn { background: none; border: none; color: #ddd; font-size: 20px; cursor: pointer; padding: 0 4px; }
.manage-del-btn:active { color: #e53; }
.manage-add-row { display: flex; gap: 8px; padding: 10px 14px; background: #fff; border-top: .5px solid #f5f5f5; }
.manage-add-row input { flex: 1; height: 36px; border: .5px solid #ddd; border-radius: 8px; padding: 0 10px; font-size: 13px; }
.manage-add-row button { height: 36px; padding: 0 16px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
.manage-save-btn { width: 100%; height: 44px; background: #06C755; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
.manage-save-btn:active { opacity: .85; }
.photo-items-input { width: 100%; min-height: 80px; border: .5px solid #ddd; border-radius: 10px; padding: 10px 12px; font-size: 13px; resize: none; font-family: inherit; }

/* ── 卡片預覽畫面 ── */
#screen-preview { display: none; flex-direction: column; height: 100vh; background: #1a1a2e; }
.preview-bg { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px 20px 100px; }
.preview-phone-label { font-size: 11px; color: rgba(255,255,255,.4); text-align: center; margin-bottom: 12px; letter-spacing: .05em; }
.line-bubble {
  background: #fff; border-radius: 14px; overflow: hidden;
  width: 100%; max-width: 320px;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}
.line-bub-header {
  background: #185FA5; padding: 14px 16px;
}
.line-bub-proj  { color: rgba(255,255,255,.7); font-size: 11px; margin-bottom: 3px; }
.line-bub-title { color: #fff; font-size: 16px; font-weight: 700; }
.line-bub-meta  { color: rgba(255,255,255,.7); font-size: 11px; margin-top: 3px; }
.line-bub-body  { padding: 14px 16px; }
.line-bub-section-title { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 8px; letter-spacing: .04em; }
.line-bub-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: #333; margin-bottom: 6px; }
.line-bub-note { font-size: 11px; color: #888; padding-top: 10px; margin-top: 10px; border-top: .5px solid #eee; }
.line-bub-footer {
  background: #f9f9f9; border-top: .5px solid #eee;
  padding: 12px 16px; text-align: center;
}
.line-bub-btn {
  background: #185FA5; color: #fff; border: none; border-radius: 8px;
  padding: 9px 24px; font-size: 13px; font-weight: 700; width: 100%;
  cursor: default; opacity: .9;
}
.preview-send-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: #1a1a2e; border-top: .5px solid rgba(255,255,255,.1);
  display: flex; gap: 10px;
}
.preview-back-btn {
  height: 46px; flex: 0 0 80px; border: 1px solid rgba(255,255,255,.25); background: none;
  color: rgba(255,255,255,.7); border-radius: 12px; font-size: 13px; cursor: pointer;
}
.preview-confirm-btn {
  height: 46px; flex: 1; background: #06C755; color: #fff;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.75); color: #fff; font-size: 12px;
  padding: 8px 18px; border-radius: 20px; display: none; z-index: 200; white-space: nowrap;
}
</style>
</head>
<body>

<!-- 載入畫面 -->
<div id="screen-loading">
  <div class="spinner"></div>
  <div id="loading-text">載入中...</div>
</div>

<!-- 計畫選擇 -->
<div id="screen-project">
  <div class="header" style="display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:14px">
    <div>
      <div class="header-title">發送拍照任務</div>
      <div class="header-hint">選擇監測計畫</div>
    </div>
    <button onclick="showManageScreen()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer">⚙️ 管理</button>
  </div>
  <div style="padding:14px">
    <div class="section-label">計畫清單</div>
    <div id="project-list"></div>
  </div>
</div>

<!-- 管理主畫面 -->
<div id="screen-manage">
  <div class="manage-header">
    <button class="back-btn" onclick="showProjectScreen()">← 返回</button>
    <div style="font-size:18px;font-weight:600">計畫管理</div>
  </div>
  <div style="padding:14px">
    <div class="manage-section">
      <div class="manage-section-title">新增計畫</div>
      <div style="padding:0 14px 14px;display:flex;flex-direction:column;gap:8px">
        <input id="new-proj-name" type="text" placeholder="計畫名稱（必填）" style="height:36px;border:.5px solid #ddd;border-radius:8px;padding:0 10px;font-size:13px;width:100%">
        <input id="new-proj-desc" type="text" placeholder="說明（選填）" style="height:36px;border:.5px solid #ddd;border-radius:8px;padding:0 10px;font-size:13px;width:100%">
        <button onclick="addProject()" style="height:40px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">新增計畫</button>
      </div>
    </div>
    <div class="manage-section">
      <div class="manage-section-title">現有計畫（點入管理點位）</div>
      <div id="manage-proj-list"></div>
    </div>
  </div>
</div>

<!-- 計畫內管理（點位 + 拍照項目） -->
<div id="screen-manage-proj">
  <div class="manage-header">
    <button class="back-btn" onclick="showManageScreen()">← 返回計畫管理</button>
    <div id="mp-title" style="font-size:18px;font-weight:600"></div>
  </div>
  <div style="padding:14px">
    <!-- 點位管理 -->
    <div class="manage-section">
      <div class="manage-section-title">監測點位</div>
      <div id="mp-station-list"></div>
      <div class="manage-add-row">
        <input id="new-st-name" type="text" placeholder="點位名稱">
        <input id="new-st-loc"  type="text" placeholder="地點（選填）" style="flex:.8">
        <button onclick="addStation()">＋</button>
      </div>
    </div>
    <!-- 拍照項目 -->
    <div class="manage-section">
      <div class="manage-section-title">拍照項目（用逗號分隔）</div>
      <div style="padding:10px 14px">
        <textarea class="photo-items-input" id="mp-photo-items" placeholder="例：環境照,水色,洗井紀錄表"></textarea>
        <button class="manage-save-btn" onclick="savePhotoItems()">儲存拍照項目</button>
      </div>
    </div>
  </div>
</div>

<!-- 任務組合 -->
<div id="screen-compose">
  <div class="header">
    <button class="back-btn" onclick="showProjectScreen()">← 返回計畫</button>
    <div class="header-title" id="c-project-name"></div>
    <div class="header-hint" id="c-date"></div>
  </div>

  <div class="compose-scroll">

    <!-- 模板快選 -->
    <div class="section" style="padding-top:12px">
      <div class="section-label">常用模板</div>
      <div style="background:#fff;border-radius:12px;overflow:hidden">
        <div class="template-chips" id="template-chips"></div>
      </div>
    </div>

    <!-- 拍照項目 -->
    <div class="section" style="padding-top:12px">
      <div class="section-label">拍照項目</div>
      <div style="background:#fff;border-radius:12px;overflow:hidden">
        <div id="items-list"></div>
        <div class="add-row">
          <input type="text" id="custom-input" placeholder="新增項目名稱" />
          <button onclick="addCustomItem()">＋</button>
        </div>
      </div>
    </div>

    <!-- 提醒事項 -->
    <div class="section" style="padding-top:12px" id="reminder-section">
      <div class="section-label">提醒事項（勾選要加入卡片的）</div>
      <div style="background:#fff;border-radius:12px;overflow:hidden" id="reminder-list"></div>
    </div>

    <!-- 點位清單（說明用） -->
    <div class="section" style="padding-top:12px">
      <div class="section-label">計畫點位（現場人員開啟後自行選擇）</div>
      <div class="station-preview" id="station-preview"></div>
    </div>

    <!-- 備注 -->
    <div class="section" style="padding-top:12px">
      <div class="section-label">備注（選填）</div>
      <textarea class="note-input" id="task-note" placeholder="例：攜帶採水桶、確認採樣瓶數量" oninput="updatePreview()"></textarea>
    </div>

    <!-- 已選摘要 -->
    <div class="section" style="padding-top:12px;padding-bottom:14px">
      <div class="section-label">已選項目 <span id="checked-count" style="color:#185FA5;font-weight:700"></span></div>
      <div id="selected-summary" style="background:#fff;border-radius:10px;padding:10px 14px;font-size:12px;color:#888">尚未選擇任何項目</div>
    </div>

  </div><!-- end scroll -->

  <div class="send-bar">
    <button class="send-btn" id="send-btn" onclick="showPreview()" disabled>
      預覽卡片 →
    </button>
  </div>
</div>

<!-- 卡片預覽畫面 -->
<div id="screen-preview">
  <div class="preview-bg">
    <div class="preview-phone-label">LINE 卡片預覽</div>
    <div class="line-bubble">
      <div class="line-bub-header">
        <div class="line-bub-proj" id="prev-proj"></div>
        <div class="line-bub-title">拍照任務通知</div>
        <div class="line-bub-meta" id="prev-meta"></div>
      </div>
      <div class="line-bub-body">
        <div class="line-bub-section-title">拍照項目</div>
        <div id="prev-items"></div>
        <div id="prev-note" class="line-bub-note" style="display:none"></div>
      </div>
      <div class="line-bub-footer">
        <div class="line-bub-btn">開始拍照</div>
      </div>
    </div>
    <div style="margin-top:16px;font-size:11px;color:rgba(255,255,255,.35);text-align:center">
      點擊「開始拍照」按鈕後現場人員可開啟拍照介面
    </div>
  </div>
  <div class="preview-send-bar">
    <button class="preview-back-btn" onclick="hidePreview()">← 修改</button>
    <button class="preview-confirm-btn" onclick="sendTask()">發送到群組 ✓</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// ★ 填入以下設定後再部署 ★
// ============================================================
const GAS_URL          = 'https://script.google.com/macros/s/AKfycbwhF-X8KAscHycjSeilIgcLxZcz_fMiw5kmOgoVzrjaSF9ePDWolit4FL9ox157JosO/exec';
const PM_LIFF_ID       = '2010531464-isLXOyw1';
const WORKER_LIFF_ID   = '2010531464-B8rVB6zr';
const GITHUB_PAGES_URL = 'https://z4p5b5z95r-crypto.github.io/env-monitor'; // GitHub Pages 網址
// ============================================================

// ── 狀態 ──────────────────────────────────────────────────
let me = null;
let projects = [], selectedProject = null;
let templates = [], stations = [];
let allItems = [];          // 所有可選拍照項目
let checkedItems = [];      // 已勾選拍照項目
let reminderTemplates = []; // 提醒事項清單
let checkedReminders  = []; // 已勾選提醒

// ── 初始化 ────────────────────────────────────────────────
async function init() {
  try {
    setText('loading-text', '初始化 LIFF...');
    await liff.init({ liffId: PM_LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    me = await liff.getProfile();

    setText('loading-text', '載入計畫...');
    const res  = await fetch(`${GAS_URL}?action=getProjects`);
    const json = await res.json();
    projects   = json.data || [];

    showProjectScreen();
  } catch (err) {
    setText('loading-text', '載入失敗：' + err.message);
  }
}

// ── 計畫選擇畫面 ──────────────────────────────────────────
function showProjectScreen() {
  show('screen-project');
  hide('screen-loading'); hide('screen-compose'); hide('screen-manage'); hide('screen-manage-proj');
  renderProjectList();
}

function renderProjectList() {
  document.getElementById('project-list').innerHTML = projects.map(p => `
    <div class="proj-btn" onclick='selectProject(${JSON.stringify(p)})'>
      <div class="proj-dot"></div>
      <div>
        <div class="proj-name">${p.name}</div>
        ${p.description ? `<div class="proj-desc">${p.description}</div>` : ''}
      </div>
    </div>
  `).join('');
}

async function selectProject(project) {
  selectedProject = project;

  // 載入模板 & 點位
  try {
    const [tRes, sRes] = await Promise.all([
      fetch(`${GAS_URL}?action=getTemplates&projectId=${project.projectId}`),
      fetch(`${GAS_URL}?action=getStations&projectId=${project.projectId}`)
    ]);
    templates = (await tRes.json()).data || [];
    stations  = (await sRes.json()).data || [];
  } catch (e) { templates = []; stations = []; }

  // 拍照項目
  const photoTpl    = templates.find(t => t.category === '拍照任務');
  allItems          = photoTpl ? photoTpl.photoItems.split(',').map(s => s.trim()).filter(Boolean) : [];
  checkedItems      = [...allItems];
  // 提醒事項（排除拍照任務欄位）
  reminderTemplates = templates.filter(t => t.category !== '拍照任務' && t.content);
  checkedReminders  = reminderTemplates.map(t => t.templateId); // 預設全選

  hide('screen-project');
  show('screen-compose');
  renderComposeScreen();
}

// ── 組合畫面 ─────────────────────────────────────────────
function renderComposeScreen() {
  const dateStr = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
  setText('c-project-name', selectedProject.name);
  setText('c-date', dateStr);

  renderTemplateChips();
  renderItemsList();
  renderReminderList();
  renderStationPreview();
  updatePreview();
}

function renderTemplateChips() {
  const chips = document.getElementById('template-chips');
  const photoTemplates = templates.filter(t => t.category === '拍照任務' && t.photoItems);
  if (!photoTemplates.length) { chips.parentElement.style.display = 'none'; return; }

  chips.innerHTML = photoTemplates.map(t => `
    <div class="template-chip" onclick="applyTemplate('${t.photoItems}')">
      ${t.templateId ? t.templateId + '：' : ''}${t.photoItems}
    </div>
  `).join('') + `<div class="template-chip" onclick="checkAll()">全選</div>
    <div class="template-chip" onclick="uncheckAll()">清空</div>`;
}

function applyTemplate(photoItemsStr) {
  const items = photoItemsStr.split(',').map(s => s.trim()).filter(Boolean);
  items.forEach(item => { if (!allItems.includes(item)) allItems.push(item); });
  checkedItems = [...items];
  renderItemsList();
  updatePreview();
}

function checkAll()   { checkedItems = [...allItems]; renderItemsList(); updatePreview(); }
function uncheckAll() { checkedItems = [];            renderItemsList(); updatePreview(); }

function renderItemsList() {
  document.getElementById('items-list').innerHTML = allItems.map(item => `
    <div class="item-row" onclick="toggleItem('${item}')">
      <div class="check-box ${checkedItems.includes(item) ? 'on' : ''}">
        ${checkedItems.includes(item) ? '✓' : ''}
      </div>
      <div class="item-label">${item}</div>
      <button class="item-delete" onclick="event.stopPropagation();deleteItem('${item}')">×</button>
    </div>
  `).join('');
}

function toggleItem(item) {
  const idx = checkedItems.indexOf(item);
  idx > -1 ? checkedItems.splice(idx, 1) : checkedItems.push(item);
  renderItemsList();
  updatePreview();
}

function deleteItem(item) {
  allItems    = allItems.filter(i => i !== item);
  checkedItems = checkedItems.filter(i => i !== item);
  renderItemsList();
  updatePreview();
}

function addCustomItem() {
  const input = document.getElementById('custom-input');
  const val   = input.value.trim();
  if (!val) return;
  if (!allItems.includes(val)) {
    allItems.push(val);
    checkedItems.push(val);
  }
  input.value = '';
  renderItemsList();
  updatePreview();
}

function renderReminderList() {
  const sec = document.getElementById('reminder-section');
  const el  = document.getElementById('reminder-list');
  if (!reminderTemplates.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  el.innerHTML = reminderTemplates.map(t => {
    const on = checkedReminders.includes(t.templateId);
    return `
      <div class="item-row" onclick="toggleReminder('${t.templateId}')">
        <div class="check-box ${on ? 'on' : ''}">${on ? '✓' : ''}</div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:#185FA5">${t.category}</div>
          <div style="font-size:12px;color:#555;margin-top:2px">${t.content}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleReminder(id) {
  const idx = checkedReminders.indexOf(id);
  idx > -1 ? checkedReminders.splice(idx, 1) : checkedReminders.push(id);
  renderReminderList();
  updatePreview();
}

function renderStationPreview() {
  const el = document.getElementById('station-preview');
  if (!stations.length) { el.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:#aaa">尚未設定點位，請先在 Sheets stations 工作表新增</div>'; return; }
  el.innerHTML = stations.map(s => `
    <div class="station-preview-row">
      <span style="font-weight:600;color:#333;min-width:60px">${s.name}</span>
      <span style="color:#888">${s.location || ''}</span>
      ${s.note ? `<span style="color:#D97706;margin-left:auto;font-size:10px">⚠️ ${s.note}</span>` : ''}
    </div>
  `).join('');
}

function updatePreview() {
  // 已選摘要（compose 畫面底部）
  const summaryEl = document.getElementById('selected-summary');
  const countEl   = document.getElementById('checked-count');
  if (checkedItems.length) {
    countEl.textContent  = `（${checkedItems.length} 項）`;
    summaryEl.innerHTML  = checkedItems.map(i => `<span style="display:inline-block;background:#EBF4FF;color:#185FA5;border-radius:12px;padding:2px 10px;margin:2px;font-size:12px">📷 ${i}</span>`).join('');
  } else {
    countEl.textContent  = '';
    summaryEl.textContent = '尚未選擇任何項目';
    summaryEl.style.color = '#bbb';
  }
  document.getElementById('send-btn').disabled = checkedItems.length === 0;
}

function showPreview() {
  const dateStr = new Date().toLocaleDateString('zh-TW', { month: 'long', day: 'numeric' });
  setText('prev-proj', selectedProject ? selectedProject.name : '');
  setText('prev-meta', `${dateStr}　發送：${me ? me.displayName : 'PM'}`);

  // 拍照項目
  let bodyHTML = `<div class="line-bub-section-title">拍照項目</div>`
    + checkedItems.map(i => `<div class="line-bub-item"><span>📷</span><span>${i}</span></div>`).join('');

  // 提醒事項
  const selRem = reminderTemplates.filter(t => checkedReminders.includes(t.templateId));
  if (selRem.length) {
    bodyHTML += `<div style="border-top:.5px solid #eee;margin:10px 0 8px"></div>
      <div class="line-bub-section-title">提醒事項</div>`
      + selRem.map(r => `
        <div class="line-bub-item" style="align-items:flex-start">
          <span>⚠️</span>
          <div><div style="font-size:11px;font-weight:700;color:#D97706">${r.category}</div>
               <div style="font-size:12px;color:#555">${r.content}</div></div>
        </div>`).join('');
  }
  document.getElementById('prev-items').innerHTML = bodyHTML;

  const note = document.getElementById('task-note').value.trim();
  const noteEl = document.getElementById('prev-note');
  if (note) { noteEl.style.display = 'block'; noteEl.textContent = '📌 ' + note; }
  else       { noteEl.style.display = 'none'; }

  hide('screen-compose');
  document.getElementById('screen-preview').style.display = 'flex';
}

function hidePreview() {
  document.getElementById('screen-preview').style.display = 'none';
  show('screen-compose');
}

// ── 發送任務 ─────────────────────────────────────────────
// ★ shareTargetPicker 在 onclick 觸發後必須同步呼叫（user activation）
function sendTask() {
  // 產生 taskId：projectId-YYYYMMDD
  const d = new Date();
  const dateKey = d.getFullYear().toString()
    + String(d.getMonth() + 1).padStart(2, '0')
    + String(d.getDate()).padStart(2, '0');
  const taskId = `${selectedProject.projectId}-${dateKey}`;

  // 組合 worker LIFF URL（現場人員點卡片上的按鈕會開這個連結）
  const workerUrl = `${GITHUB_PAGES_URL}/worker.html`
    + `?taskId=${encodeURIComponent(taskId)}`
    + `&projectId=${encodeURIComponent(selectedProject.projectId)}`
    + `&projectName=${encodeURIComponent(selectedProject.name)}`
    + `&items=${encodeURIComponent(checkedItems.join(','))}`;

  const note    = document.getElementById('task-note').value.trim();
  const dateStr = d.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric' });

  // 已勾選的提醒事項物件
  const selectedReminders = reminderTemplates.filter(t => checkedReminders.includes(t.templateId));

  // 組合 Flex Message
  const flex = {
    type: 'flex',
    altText: `【任務通知】${selectedProject.name} — ${dateStr}`,
    contents: {
      type: 'bubble',
      header: {
        type: 'box', layout: 'vertical', backgroundColor: '#185FA5', paddingAll: '16px',
        contents: [
          { type: 'text', text: selectedProject.name, color: 'rgba(255,255,255,0.75)', size: 'xs' },
          { type: 'text', text: '拍照任務通知', color: '#FFFFFF', weight: 'bold', size: 'lg', margin: 'xs' },
          { type: 'text', text: `${dateStr}　發送：${me.displayName}`, color: 'rgba(255,255,255,0.75)', size: 'xs', margin: 'xs' }
        ]
      },
      body: {
        type: 'box', layout: 'vertical', spacing: 'sm',
        contents: [
          { type: 'text', text: '拍照項目', weight: 'bold', size: 'sm', color: '#888888' },
          ...checkedItems.map(item => ({
            type: 'box', layout: 'horizontal', spacing: 'sm',
            contents: [
              { type: 'text', text: '📷', flex: 0, size: 'sm' },
              { type: 'text', text: item, size: 'sm', color: '#333333', flex: 1 }
            ]
          })),
          // ── 提醒事項 ──
          ...(selectedReminders.length ? [
            { type: 'separator', margin: 'md' },
            { type: 'text', text: '提醒事項', weight: 'bold', size: 'sm', color: '#888888', margin: 'md' },
            ...selectedReminders.map(r => ({
              type: 'box', layout: 'horizontal', spacing: 'sm', margin: 'sm',
              contents: [
                { type: 'text', text: '⚠️', flex: 0, size: 'xs' },
                { type: 'box', layout: 'vertical', flex: 1,
                  contents: [
                    { type: 'text', text: r.category, size: 'xs', weight: 'bold', color: '#D97706' },
                    { type: 'text', text: r.content,  size: 'xs', color: '#555555', wrap: true }
                  ]
                }
              ]
            }))
          ] : []),
          ...(note ? [
            { type: 'separator', margin: 'md' },
            { type: 'text', text: '📌 ' + note, size: 'xs', color: '#888888', wrap: true, margin: 'md' }
          ] : [])
        ]
      },
      footer: {
        type: 'box', layout: 'vertical', paddingAll: '10px',
        contents: [{
          type: 'button',
          action: { type: 'uri', label: '開始拍照', uri: workerUrl },
          style: 'primary', color: '#185FA5', height: 'sm'
        }]
      }
    }
  };

  // 檢查是否在群組/聊天室情境中開啟
  const ctx = liff.getContext();
  if (!ctx || !['utou','room','group'].includes(ctx.type)) {
    showToast('請在群組對話中開啟此 LIFF');
    return;
  }

  // 直接發送到當前 LINE 對話
  liff.sendMessages([flex])
    .then(() => {
      // 記錄到 GAS（非關鍵）
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'createTask',
          taskId, projectId: selectedProject.projectId,
          assignedTo: '', assignedBy: me.displayName
        })
      }).catch(() => {});
      document.getElementById('screen-preview').style.display = 'none';
      showProjectScreen();
      showToast('任務已發送 ✓');
    })
    .catch(err => {
      const msg = err && err.message ? err.message : String(err);
      showToast('發送失敗：' + msg, 4000);
    });
}

// ── 管理功能 ──────────────────────────────────────────────
let managingProject = null;
let manageStations  = [];

async function showManageScreen() {
  hide('screen-project'); hide('screen-compose'); hide('screen-manage-proj');
  show('screen-manage');
  renderManageProjList();
}

function renderManageProjList() {
  document.getElementById('manage-proj-list').innerHTML = projects.length
    ? projects.map(p => `
        <div class="manage-row" onclick='openManageProject(${JSON.stringify(p)})' style="cursor:pointer">
          <div>
            <div class="manage-row-label">${p.name}</div>
            ${p.description ? `<div class="manage-row-sub">${p.description}</div>` : ''}
          </div>
          <span style="color:#aaa;font-size:18px">›</span>
        </div>`).join('')
    : '<div style="padding:14px;font-size:13px;color:#aaa">尚無計畫</div>';
}

async function addProject() {
  const name = document.getElementById('new-proj-name').value.trim();
  if (!name) { showToast('請輸入計畫名稱'); return; }
  const desc = document.getElementById('new-proj-desc').value.trim();
  try {
    const res  = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'createProject', name, description: desc }) });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    showToast('計畫已新增 ✓');
    document.getElementById('new-proj-name').value = '';
    document.getElementById('new-proj-desc').value = '';
    // 重新載入計畫清單
    const pRes = await fetch(`${GAS_URL}?action=getProjects`);
    const pJson = await pRes.json();
    projects = pJson.data || [];
    renderManageProjList();
    renderProjectList();
  } catch (e) { showToast('新增失敗：' + e.message); }
}

async function openManageProject(project) {
  managingProject = project;
  setText('mp-title', project.name);
  hide('screen-manage');
  show('screen-manage-proj');
  // 載入點位
  try {
    const sRes = await fetch(`${GAS_URL}?action=getStations&projectId=${project.projectId}`);
    manageStations = (await sRes.json()).data || [];
  } catch (e) { manageStations = []; }
  renderManageStations();
  // 載入現有拍照項目
  try {
    const tRes = await fetch(`${GAS_URL}?action=getTemplates&projectId=${project.projectId}`);
    const tpl  = ((await tRes.json()).data || []).find(t => t.category === '拍照任務');
    document.getElementById('mp-photo-items').value = tpl ? tpl.photoItems : '';
  } catch (e) {}
}

function renderManageStations() {
  const el = document.getElementById('mp-station-list');
  el.innerHTML = manageStations.length
    ? manageStations.map(s => `
        <div class="manage-row">
          <div style="flex:1">
            <div class="manage-row-label">${s.name}</div>
            ${s.location ? `<div class="manage-row-sub">${s.location}</div>` : ''}
          </div>
          <button class="manage-del-btn" onclick="delStation('${s.stationId}')">×</button>
        </div>`).join('')
    : '<div style="padding:12px 14px;font-size:13px;color:#aaa">尚無點位</div>';
}

async function addStation() {
  const name = document.getElementById('new-st-name').value.trim();
  if (!name) { showToast('請輸入點位名稱'); return; }
  const loc  = document.getElementById('new-st-loc').value.trim();
  try {
    const res  = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'createStation', projectId: managingProject.projectId, name, location: loc }) });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    showToast('點位已新增 ✓');
    document.getElementById('new-st-name').value = '';
    document.getElementById('new-st-loc').value  = '';
    const sRes = await fetch(`${GAS_URL}?action=getStations&projectId=${managingProject.projectId}`);
    manageStations = (await sRes.json()).data || [];
    renderManageStations();
  } catch (e) { showToast('新增失敗：' + e.message); }
}

async function delStation(stationId) {
  if (!confirm('確定刪除這個點位？')) return;
  try {
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteStation', stationId }) });
    manageStations = manageStations.filter(s => s.stationId !== stationId);
    renderManageStations();
    showToast('已刪除');
  } catch (e) { showToast('刪除失敗'); }
}

async function savePhotoItems() {
  const photoItems = document.getElementById('mp-photo-items').value.trim();
  if (!photoItems) { showToast('請輸入拍照項目'); return; }
  try {
    const res  = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'savePhotoItems', projectId: managingProject.projectId, photoItems }) });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    showToast('拍照項目已儲存 ✓');
  } catch (e) { showToast('儲存失敗：' + e.message); }
}

// ── 工具 ─────────────────────────────────────────────────
function show(id)       { document.getElementById(id).style.display = id === 'screen-compose' ? 'flex' : 'block'; }
function hide(id)       { document.getElementById(id).style.display = 'none'; }
function setText(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }

function showToast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', ms);
}

init();
</script>
