<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>現場拍照任務</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f3f8; -webkit-tap-highlight-color: transparent; }

.spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #185FA5; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Loading ── */
#screen-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; }
#loading-text { font-size: 13px; color: #888; }

/* ── 點位選擇 ── */
#screen-station { display: none; }
.st-header { background: #185FA5; color: #fff; padding: 48px 18px 20px; }
.st-top   { font-size: 11px; color: #FFFFFFBF; margin-bottom: 4px; }
.st-title { font-size: 20px; font-weight: 700; }
.st-sub   { font-size: 12px; color: #FFFFFFBF; margin-top: 4px; }
.st-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
.st-btn   { background: #fff; border: 0.5px solid #dde3ee; border-radius: 14px; padding: 18px 14px; text-align: left; cursor: pointer; }
.st-btn:active { background: #ebf4ff; border-color: #185FA5; }
.st-name  { font-size: 14px; font-weight: 700; color: #222; }
.st-loc   { font-size: 11px; color: #888; margin-top: 4px; }
.st-note  { font-size: 10px; color: #d97706; margin-top: 3px; }

/* ── 拍照主畫面 ── */
#screen-photo { display: none; flex-direction: column; min-height: 100vh; }

.ph-header { background: #185FA5; color: #fff; padding: 44px 18px 16px; flex-shrink: 0; }
.ph-back   { background: none; border: none; color: #FFFFFFBF; font-size: 12px; cursor: pointer; padding: 0; margin-bottom: 6px; }
.ph-station { font-size: 20px; font-weight: 700; }
.ph-meta   { font-size: 12px; color: #FFFFFFBF; margin-top: 3px; }

/* 整體進度條 */
.progress-bar-wrap { background: rgba(0,0,0,.15); height: 3px; }
.progress-bar-fill { background: #06C755; height: 3px; transition: width .4s; }

/* 捲動區域 */
.items-scroll { flex: 1; overflow-y: auto; padding: 12px 14px 120px; }

/* 每個項目卡片 */
.item-card {
  background: #fff;
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1.5px solid #e8ecf4;
  transition: border-color .2s;
}
.item-card.state-sent    { border-color: #06C755; background: #f6fef9; }
.item-card.state-pending { border-color: #f59e0b; }

/* 卡片標題行 */
.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-name { font-size: 16px; font-weight: 700; color: #1a1a2e; }

/* 狀態標籤 */
.status-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.badge-empty   { background: #f0f3f8; color: #999; }
.badge-pending { background: #FEF3C7; color: #d97706; }
.badge-sent    { background: #dcfce7; color: #15803d; }

/* 拍照按鈕 */
.cam-btn {
  width: 100%; height: 52px;
  background: #185FA5; color: #fff;
  border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.cam-btn:active  { opacity: .85; }
.cam-btn.has-photo { background: #1450a0; height: 44px; font-size: 14px; }
.cam-btn.maxed   { background: #d0d5dd; pointer-events: none; font-size: 13px; }

/* 縮圖 */
.thumbs-row { display: flex; gap: 7px; flex-wrap: wrap; margin: 10px 0 0; }
.thumb { width: 64px; height: 64px; border-radius: 9px; object-fit: cover; border: .5px solid #ddd; background: #f0f3f8; }

/* 傳給PM按鈕 */
.send-btn {
  width: 100%; height: 42px; margin-top: 10px;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer;
}
.send-btn.unsent { background: #06C755; color: #fff; }
.send-btn.sent   { background: #dcfce7; color: #15803d; pointer-events: none; }

/* 固定底部 */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: #fff; border-top: 0.5px solid #e8ecf4;
  display: flex; gap: 8px;
}
.btn-send-all {
  flex: 1; height: 50px; border: none; border-radius: 14px;
  background: #185FA5; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
}
.btn-send-all:disabled { background: #e0e5ee; color: #aaa; }
.btn-send-all.all-sent { background: #06C755; }

/* 覆蓋層 */
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 100; }
.overlay-box { background: #fff; border-radius: 16px; padding: 24px 28px; text-align: center; min-width: 160px; }
.overlay-box .spinner { margin: 0 auto; }
#overlay-text { font-size: 13px; color: #555; margin-top: 12px; }

/* Toast */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.8); color: #fff; font-size: 13px; padding: 9px 20px; border-radius: 22px; display: none; z-index: 200; white-space: nowrap; pointer-events: none; }

#inputs { display: none; }
</style>
</head>
<body>

<div id="screen-loading">
  <div class="spinner"></div>
  <div id="loading-text">初始化中...</div>
</div>

<!-- 點位選擇 -->
<div id="screen-station">
  <div class="st-header">
    <div class="st-top" id="st-project"></div>
    <div class="st-title">選擇監測點位</div>
    <div class="st-sub"  id="st-date"></div>
  </div>
  <div class="st-grid" id="station-grid"></div>
</div>

<!-- 拍照主畫面 -->
<div id="screen-photo">
  <div class="ph-header">
    <button class="ph-back" onclick="showStationScreen()">← 切換點位</button>
    <div class="ph-station" id="ph-station"></div>
    <div class="ph-meta"    id="ph-meta"></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <div class="items-scroll" id="items-list"></div>

  <div class="bottom-bar">
    <button class="btn-send-all" id="btn-send-all" onclick="sendAllUnsent()">傳未送的給 PM</button>
  </div>
</div>

<div id="overlay"><div class="overlay-box"><div class="spinner"></div><div id="overlay-text">上傳中...</div></div></div>
<div id="toast"></div>
<div id="inputs"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwhF-X8KAscHycjSeilIgcLxZcz_fMiw5kmOgoVzrjaSF9ePDWolit4FL9ox157JosO/exec';
const LIFF_ID = '2010531464-B8rVB6zr';

let me = null;
let taskId = '', projectId = '', projectName = '', photoItems = [];
let stations = [], selectedStation = null;
let photoState = {}; // { item: [{ driveUrl, sent }] }

// ── Google Drive URL 轉換成可嵌入格式 ────────────────────
function toEmbedUrl(url) {
  if (!url) return '';
  // 已經是 uc 格式
  if (url.includes('drive.google.com/uc')) return url;
  // file/d/ID/view → uc?export=view&id=ID
  const m = url.match(/\/file\/d\/([^/]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return url;
}

// ── 初始化 ────────────────────────────────────────────────
async function init() {
  try {
    setText('loading-text', '初始化 LIFF...');
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    me = await liff.getProfile();

    const p     = new URLSearchParams(location.search);
    taskId      = p.get('taskId')      || '';
    projectId   = p.get('projectId')   || '';
    projectName = decodeURIComponent(p.get('projectName') || '');
    photoItems  = decodeURIComponent(p.get('items') || '').split(',').filter(Boolean);
    photoItems.forEach(item => photoState[item] = []);

    setText('loading-text', '載入點位...');
    const res  = await fetch(`${GAS_URL}?action=getStations&projectId=${encodeURIComponent(projectId)}`);
    stations   = (await res.json()).data || [];
    showStationScreen();
  } catch (err) {
    setText('loading-text', '載入失敗：' + err.message);
  }
}

// ── 點位選擇 ──────────────────────────────────────────────
function showStationScreen() {
  show('screen-station'); hide('screen-photo'); hide('screen-loading');
  setText('st-project', projectName);
  setText('st-date', new Date().toLocaleDateString('zh-TW', { month: 'long', day: 'numeric' }));
  document.getElementById('station-grid').innerHTML = stations.map(s => `
    <button class="st-btn" onclick='pickStation(${JSON.stringify(s)})'>
      <div class="st-name">${s.name}</div>
      ${s.location ? `<div class="st-loc">📍 ${s.location}</div>` : ''}
      ${s.note     ? `<div class="st-note">⚠️ ${s.note}</div>` : ''}
    </button>`).join('');
}

async function pickStation(station) {
  selectedStation = station;
  showOverlay('載入照片狀態...');
  photoItems.forEach(item => photoState[item] = []);
  try {
    const res  = await fetch(`${GAS_URL}?action=getTaskStatus&taskId=${encodeURIComponent(taskId)}&stationId=${encodeURIComponent(station.stationId)}`);
    const data = await res.json();
    (data.photos || []).forEach(p => {
      if (!photoState[p.photoItem]) photoState[p.photoItem] = [];
      photoState[p.photoItem].push({
        driveUrl: toEmbedUrl(p.driveUrl),
        sent: p.sentToPM === true || p.sentToPM === 'TRUE'
      });
    });
  } catch (e) {}
  hideOverlay();
  showPhotoScreen();
}

// ── 拍照主畫面 ──────────────────────────────────────────
function showPhotoScreen() {
  hide('screen-station'); hide('screen-loading');
  document.getElementById('screen-photo').style.display = 'flex';
  setText('ph-station', selectedStation.name);
  renderAll();
}

function renderAll() {
  // header meta
  const done = photoItems.filter(i => (photoState[i] || []).length > 0).length;
  setText('ph-meta', `${projectName}　${done} / ${photoItems.length} 項目已拍`);

  // 整體進度
  const sentCount = photoItems.filter(i => (photoState[i] || []).some(p => p.sent)).length;
  document.getElementById('progress-fill').style.width = (sentCount / photoItems.length * 100) + '%';

  // 每個項目
  document.getElementById('items-list').innerHTML = photoItems.map(item => {
    const photos  = photoState[item] || [];
    const count   = photos.length;
    const allSent = count > 0 && photos.every(p => p.sent);
    const hasPending = photos.some(p => !p.sent);

    // 狀態
    let cardCls = '', badgeCls = '', badgeText = '';
    if (allSent) {
      cardCls = 'state-sent'; badgeCls = 'badge-sent'; badgeText = '✓ 已傳送';
    } else if (hasPending) {
      cardCls = 'state-pending'; badgeCls = 'badge-pending'; badgeText = `已拍 ${count} 張`;
    } else {
      badgeCls = 'badge-empty'; badgeText = '未拍';
    }

    // 拍照按鈕
    let camCls = 'cam-btn', camText = '📷　拍照';
    if (count >= 5) {
      camCls += ' maxed'; camText = '已達上限 5 張';
    } else if (count > 0) {
      camCls += ' has-photo'; camText = `📷　繼續拍（已拍 ${count} 張）`;
    }

    // 縮圖
    const thumbsHtml = photos.map(p =>
      `<img class="thumb" src="${p.driveUrl}" loading="lazy" onerror="this.style.opacity='.3'">`
    ).join('');

    // 傳給PM
    const sendHtml = hasPending
      ? `<button class="send-btn unsent" onclick="sendItem('${item}')">傳給 PM</button>`
      : allSent
        ? `<button class="send-btn sent">✓ 已傳送給 PM</button>`
        : '';

    return `
      <div class="item-card ${cardCls}" id="card-${encodeItemId(item)}">
        <div class="card-top">
          <div class="card-name">${item}</div>
          <div class="status-badge ${badgeCls}">${badgeText}</div>
        </div>
        <button class="${camCls}" onclick="triggerCamera('${item}')">${camText}</button>
        ${thumbsHtml ? `<div class="thumbs-row">${thumbsHtml}</div>` : ''}
        ${sendHtml}
      </div>`;
  }).join('');

  // 底部按鈕
  const pendingItems = photoItems.filter(i => (photoState[i] || []).some(p => !p.sent) && (photoState[i] || []).length > 0);
  const allDone = photoItems.every(i => (photoState[i] || []).length > 0 && (photoState[i] || []).every(p => p.sent));
  const btn = document.getElementById('btn-send-all');
  if (allDone) {
    btn.textContent = '✓ 全部已傳送給 PM';
    btn.className   = 'btn-send-all all-sent';
    btn.disabled    = true;
  } else if (pendingItems.length) {
    btn.textContent = `傳未送的給 PM（${pendingItems.length} 項）`;
    btn.className   = 'btn-send-all';
    btn.disabled    = false;
  } else {
    btn.textContent = '先拍照再傳給 PM';
    btn.className   = 'btn-send-all';
    btn.disabled    = true;
  }
}

function encodeItemId(item) { return item.replace(/[^a-zA-Z0-9一-鿿]/g, '_'); }

// ── 拍照 ─────────────────────────────────────────────────
function triggerCamera(item) {
  if ((photoState[item] || []).length >= 5) return;
  const id = 'fi_' + encodeItemId(item);
  let input = document.getElementById(id);
  if (!input) {
    input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment'; input.id = id;
    input.addEventListener('change', () => { if (input.files[0]) handleFile(item, input.files[0]); });
    document.getElementById('inputs').appendChild(input);
  }
  input.value = '';
  input.click();
}

async function handleFile(item, file) {
  showOverlay('上傳中...');
  try {
    const base64   = await toBase64(file);
    const idx      = (photoState[item] || []).length + 1;
    const filename = `${selectedStation.stationId}_${me.displayName}_${item}_${idx}.jpg`;
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'uploadPhoto', taskId, projectName,
        stationId: selectedStation.stationId, stationName: selectedStation.name,
        photoItem: item, photoIndex: idx, uploaderName: me.displayName, base64, filename
      })
    });
    const { ok, driveUrl, error } = await res.json();
    if (ok) {
      if (!photoState[item]) photoState[item] = [];
      photoState[item].push({ driveUrl: toEmbedUrl(driveUrl), sent: false });
      showToast('上傳完成 ✓');
    } else {
      showToast('上傳失敗：' + (error || '未知'));
    }
  } catch (err) {
    showToast('上傳失敗：' + err.message);
  }
  hideOverlay();
  renderAll();
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ── 傳送 ─────────────────────────────────────────────────
function sendItem(item) { _send([item]); }

function sendAllUnsent() {
  const items = photoItems.filter(i => (photoState[i] || []).some(p => !p.sent) && (photoState[i] || []).length > 0);
  if (items.length) _send(items);
}

async function _send(items) {
  showOverlay('傳送中...');
  try {
    const ctx = liff.getContext();
    if (!ctx || !['utou','room','group'].includes(ctx.type)) {
      showToast('請在群組對話中開啟此 LIFF', 4000);
      hideOverlay();
      return;
    }
    const flex = buildFlex(items);
    await liff.sendMessages([flex]);
    await Promise.all(items.map(item =>
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'markSentToPM', taskId, stationId: selectedStation.stationId, photoItem: item })
      }).catch(() => {})
    ));
    items.forEach(item => (photoState[item] || []).forEach(p => p.sent = true));
    showToast('已傳送給 PM ✓');
  } catch(err) {
    showToast('傳送失敗：' + (err && err.message ? err.message : err), 4000);
  }
  hideOverlay();
  renderAll();
}

// ── Flex Message ─────────────────────────────────────────
function buildFlex(items) {
  const time = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  const bubbles = [];

  // 摘要 bubble
  bubbles.push({
    type: 'bubble', size: 'kilo',
    header: {
      type: 'box', layout: 'vertical', backgroundColor: '#185FA5', paddingAll: '14px',
      contents: [
        { type: 'text', text: selectedStation.name, color: '#FFFFFF', weight: 'bold', size: 'md' },
        { type: 'text', text: me.displayName + '　' + time, color: '#FFFFFFBF', size: 'xs', margin: 'xs' }
      ]
    },
    body: {
      type: 'box', layout: 'vertical', spacing: 'none',
      contents: [
        { type: 'text', text: '拍照完成項目', weight: 'bold', size: 'xs', color: '#888888' },
        ...photoItems.map(item => {
          const count = (photoState[item] || []).length;
          return {
            type: 'box', layout: 'horizontal', spacing: 'sm', margin: 'sm',
            contents: [
              { type: 'text', text: count > 0 ? '✓' : '－', color: count > 0 ? '#06C755' : '#CCCCCC', flex: 0, size: 'sm', weight: 'bold' },
              { type: 'text', text: item + (count > 0 ? ` (${count}張)` : ''), color: count > 0 ? '#333333' : '#AAAAAA', size: 'sm', flex: 1 }
            ]
          };
        })
      ]
    }
  });

  // 每個有照片的項目 → photo bubble
  items.forEach(item => {
    const photos = (photoState[item] || []).filter(p => p.driveUrl);
    if (!photos.length) return;
    bubbles.push({
      type: 'bubble', size: 'kilo',
      hero: { type: 'image', url: photos[0].driveUrl, size: 'full', aspectRatio: '4:3', aspectMode: 'cover' },
      body: {
        type: 'box', layout: 'vertical', paddingAll: '10px',
        contents: [
          { type: 'text', text: item, weight: 'bold', size: 'md' },
          { type: 'text', text: selectedStation.name + (photos.length > 1 ? `　共 ${photos.length} 張` : ''), size: 'xs', color: '#888888', margin: 'xs' },
          { type: 'text', text: me.displayName, size: 'xs', color: '#888888' }
        ]
      }
    });
  });

  return {
    type: 'flex',
    altText: `【${selectedStation.name}】${items.join('、')} — ${me.displayName}`,
    contents: bubbles.length === 1 ? bubbles[0] : { type: 'carousel', contents: bubbles }
  };
}

// ── 工具 ─────────────────────────────────────────────────
function setText(id, v)  { const el = document.getElementById(id); if (el) el.textContent = v; }
function show(id)        { document.getElementById(id).style.display = 'block'; }
function hide(id)        { document.getElementById(id).style.display = 'none'; }
function showOverlay(msg){ document.getElementById('overlay').style.display = 'flex'; setText('overlay-text', msg); }
function hideOverlay()   { document.getElementById('overlay').style.display = 'none'; }
function showToast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display = 'none', ms);
}

init();
</script>
</body>
</html>
